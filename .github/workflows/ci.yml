name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: PHP lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.0', '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Lint all PHP files
        run: |
          find . -path ./vendor -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer
      - name: Install dev dependencies
        run: composer install --no-interaction --no-progress
      - name: Run phpcs (WordPress ruleset)
        run: composer phpcs

  tests:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.0', '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer
      - name: Install dev dependencies
        run: composer install --no-interaction --no-progress
      - name: Run unit tests
        run: composer test

  plugin-check:
    name: Plugin Check (PCP, advisory)
    runs-on: ubuntu-latest
    # Advisory only: Plugin Check is the wordpress.org submission linter. This plugin
    # is distributed privately (not on wp.org), so several rules are intentionally not
    # met (Update URI: false, "wp" in the name, bundled load_plugin_textdomain). The
    # job still runs to surface code-quality findings, but it does not gate the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          exclude-directories: 'tests'
